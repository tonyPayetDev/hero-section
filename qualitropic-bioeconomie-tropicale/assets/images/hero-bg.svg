<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d3d47"/>
      <stop offset="50%" style="stop-color:#14505A"/>
      <stop offset="100%" style="stop-color:#1a6b78"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b78;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0d3d47;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="70%" cy="30%" r="25%">
      <stop offset="0%" style="stop-color:#E64128;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#E64128;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Sky background -->
  <rect width="1440" height="600" fill="url(#skyGrad)"/>

  <!-- Sun glow -->
  <ellipse cx="1050" cy="180" rx="300" ry="200" fill="url(#sunGrad)"/>

  <!-- Ocean waves -->
  <path d="M0 400 Q180 370 360 390 Q540 410 720 380 Q900 350 1080 375 Q1260 400 1440 370 L1440 600 L0 600Z" fill="url(#waterGrad)" opacity="0.6"/>
  <path d="M0 430 Q200 405 400 420 Q600 435 800 410 Q1000 385 1200 405 Q1350 420 1440 400 L1440 600 L0 600Z" fill="#0d3d47" opacity="0.8"/>

  <!-- Tropical mountain/volcano silhouette -->
  <path d="M200 400 L350 180 L500 400Z" fill="#0a2e36" opacity="0.7"/>
  <path d="M280 400 L380 220 L480 400Z" fill="#0d3d47" opacity="0.5"/>

  <!-- Tropical leaves silhouette left -->
  <path d="M-20 500 C20 400 60 350 80 300 C90 270 70 250 60 260 C40 280 20 350 0 400 C10 430 0 470 -20 500Z" fill="#0a2e36" opacity="0.8"/>
  <path d="M0 520 C50 430 90 380 110 320 C120 290 100 265 85 275 C65 295 45 370 20 420 C30 455 15 490 0 520Z" fill="#0d3d47" opacity="0.6"/>

  <!-- Tropical leaves silhouette right -->
  <path d="M1460 480 C1420 390 1380 340 1360 290 C1350 260 1370 245 1380 255 C1400 275 1420 340 1440 390 C1430 420 1445 455 1460 480Z" fill="#0a2e36" opacity="0.7"/>
  <path d="M1440 510 C1390 420 1350 370 1325 315 C1315 285 1335 262 1350 272 C1375 295 1395 365 1420 410 C1410 448 1425 482 1440 510Z" fill="#0d3d47" opacity="0.5"/>

  <!-- Decorative circles/bubbles -->
  <circle cx="100" cy="150" r="3" fill="#E64128" opacity="0.4"/>
  <circle cx="200" cy="100" r="2" fill="#E64128" opacity="0.3"/>
  <circle cx="1300" cy="120" r="3" fill="#E64128" opacity="0.4"/>
  <circle cx="1380" cy="80" r="2" fill="#E64128" opacity="0.3"/>
  <circle cx="700" cy="80" r="4" fill="#ffffff" opacity="0.15"/>
  <circle cx="850" cy="60" r="2" fill="#ffffff" opacity="0.1"/>

  <!-- Wave pattern overlay -->
  <path d="M0 350 Q360 320 720 340 Q1080 360 1440 330" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.1"/>
  <path d="M0 370 Q360 345 720 360 Q1080 375 1440 350" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.08"/>
</svg>
